{% extends "base.html" %}

{% block content %}
<section class="auth-shell">
    <article class="auth-card">
        <div class="section-heading">
            <h2>Register</h2>
            <p>Studio clients and photographers can create a user account to search matched faces.</p>
        </div>
        <form method="post" class="stack">
            {% csrf_token %}
            {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}
            {{ form.as_p }}
            <button type="submit">Create Account</button>
        </form>
        <p class="auth-switch">Already registered? <a href="{% url 'faces:login' %}">Login here</a></p>
    </article>
</section>
{% endblock %}
